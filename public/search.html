<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title id="page-title">PedusSearch</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:ital,wght@0,400;0,700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #04040a;
      --surf:    #0b0b14;
      --surf2:   #10101c;
      --border:  rgba(255,255,255,0.07);
      --green:   #00ffb4;
      --text:    #c8c8d8;
      --muted:   #505068;
      --white:   #f0f0f8;
    }

    html, body { height: 100%; }
    body {
      background: var(--bg); color: var(--text);
      font-family: 'Space Grotesk', sans-serif;
      display: flex; flex-direction: column;
      min-height: 100vh; overflow-x: hidden;
    }

    /* Grid bg */
    body::before {
      content: ''; position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
      background-size: 60px 60px;
    }

    /* ─── TOP BAR ───────────────────────────────────────────────── */
    .top-bar {
      position: sticky; top: 0; z-index: 100;
      background: rgba(4,4,10,0.9); backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 20px;
      padding: 12px 24px;
    }

    .logo-link {
      font-family: 'Space Mono', monospace; font-size: 16px; font-weight: 700;
      letter-spacing: 1px; color: var(--green); text-decoration: none;
      white-space: nowrap; display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .logo-link .dot {
      width: 8px; height: 8px; border-radius: 50%; background: var(--green);
      box-shadow: 0 0 0 0 rgba(0,255,180,0.5);
      animation: ping 2s ease-in-out infinite;
    }
    @keyframes ping {
      0%  { box-shadow: 0 0 0 0 rgba(0,255,180,0.6); }
      70% { box-shadow: 0 0 0 8px rgba(0,255,180,0); }
      100%{ box-shadow: 0 0 0 0 rgba(0,255,180,0); }
    }

    .search-row {
      flex: 1; display: flex; gap: 10px; align-items: center; max-width: 720px;
    }

    .search-wrap {
      flex: 1; display: flex; align-items: center;
      background: var(--surf2); border: 1px solid rgba(255,255,255,0.09);
      border-radius: 50px; padding: 0 18px; gap: 10px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-wrap:focus-within {
      border-color: rgba(0,255,180,0.35);
      box-shadow: 0 0 0 3px rgba(0,255,180,0.08);
    }
    .search-icon { color: var(--muted); font-size: 15px; flex-shrink: 0; }

    #search-input {
      flex: 1; background: none; border: none; outline: none;
      font-family: 'Space Grotesk', sans-serif; font-size: 15px;
      color: var(--white); caret-color: var(--green); padding: 11px 0;
    }
    #search-input::placeholder { color: var(--muted); }

    .clear-btn {
      background: none; border: none; color: var(--muted); cursor: pointer;
      font-size: 18px; padding: 0; line-height: 1; display: none;
      transition: color 0.2s;
    }
    .clear-btn:hover { color: var(--green); }
    .clear-btn.visible { display: block; }

    #search-btn {
      background: var(--green); color: #04040a; border: none;
      border-radius: 50px; padding: 10px 22px;
      font-family: 'Space Grotesk', sans-serif; font-weight: 700;
      font-size: 14px; cursor: pointer; white-space: nowrap; flex-shrink: 0;
      box-shadow: 0 0 20px rgba(0,255,180,0.25);
      transition: transform 0.15s, box-shadow 0.15s;
    }
    #search-btn:hover { transform: translateY(-1px); box-shadow: 0 4px 24px rgba(0,255,180,0.4); }

    /* ─── CONTENT AREA ──────────────────────────────────────────── */
    .content {
      position: relative; z-index: 1;
      flex: 1; display: flex; flex-direction: column;
    }

    /* ─── EMPTY STATE (homepage feel) ──────────────────────────── */
    .empty-state {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      text-align: center; padding: 60px 20px;
    }
    .empty-logo {
      font-family: 'Space Mono', monospace; font-weight: 700;
      font-size: clamp(36px, 7vw, 72px); letter-spacing: -1px;
      margin-bottom: 8px;
    }
    .empty-logo .p { color: #00ffb4; }
    .empty-logo .e { color: #3b82f6; }
    .empty-logo .d { color: #8b5cf6; }
    .empty-logo .u { color: #f472b6; }
    .empty-logo .s { color: #fb923c; }
    .empty-tagline {
      font-family: 'Space Mono', monospace; font-size: 12px;
      letter-spacing: 3px; text-transform: uppercase; color: var(--muted);
      margin-bottom: 48px;
    }
    .empty-suggestions {
      display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; max-width: 480px;
    }
    .sugg-chip {
      font-size: 13px; color: var(--text); background: var(--surf);
      border: 1px solid var(--border); border-radius: 8px;
      padding: 8px 16px; cursor: pointer; text-decoration: none;
      transition: all 0.2s;
    }
    .sugg-chip:hover {
      color: var(--green); border-color: rgba(0,255,180,0.3);
      background: rgba(0,255,180,0.05); transform: translateY(-2px);
    }

    /* ─── RESULTS (iframe) ──────────────────────────────────────── */
    .results-area {
      flex: 1; display: flex; flex-direction: column; min-height: 0;
    }
    .results-meta {
      padding: 10px 24px;
      font-family: 'Space Mono', monospace; font-size: 11px; color: var(--muted);
      letter-spacing: 1px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    .results-meta .q-label { color: var(--green); }
    .results-meta .engine-badge {
      background: rgba(0,255,180,0.08); border: 1px solid rgba(0,255,180,0.2);
      border-radius: 4px; padding: 2px 8px; font-size: 10px; letter-spacing: 1px;
    }

    /* Loading skeleton */
    .loading-state {
      flex: 1; display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
    }
    .loader-ring {
      width: 40px; height: 40px; border: 3px solid rgba(0,255,180,0.15);
      border-top-color: var(--green); border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loader-text {
      font-family: 'Space Mono', monospace; font-size: 12px;
      color: var(--muted); letter-spacing: 2px;
    }

    #results-iframe {
      flex: 1; width: 100%; border: none; min-height: 80vh;
      display: none;
      background: var(--bg);
    }

    /* ─── FOOTER ─────────────────────────────────────────────────── */
    footer {
      position: relative; z-index: 1;
      padding: 16px 24px; border-top: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      flex-wrap: wrap; gap: 8px;
      background: rgba(4,4,10,0.8);
    }
    .footer-txt {
      font-family: 'Space Mono', monospace; font-size: 10px;
      color: var(--muted); letter-spacing: 1px;
    }
    .footer-txt a { color: var(--green); text-decoration: none; }
    .footer-links {
      display: flex; gap: 16px;
    }
    .footer-links a {
      font-family: 'Space Mono', monospace; font-size: 10px;
      color: var(--muted); text-decoration: none; letter-spacing: 1px;
      transition: color 0.2s;
    }
    .footer-links a:hover { color: var(--green); }
  </style>
</head>
<body>

  <!-- ── Top bar ────────────────────────────────────────────────── -->
  <div class="top-bar">
    <a class="logo-link" href="/">
      <span class="dot"></span>
      <span>PEDUS</span>
    </a>
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="search-input" type="text" placeholder="Search anything…" autocomplete="off" spellcheck="false"/>
        <button class="clear-btn" id="clear-btn" onclick="clearSearch()" title="Clear">✕</button>
      </div>
      <button id="search-btn" onclick="doSearch()">Search</button>
    </div>
  </div>

  <!-- ── Content ────────────────────────────────────────────────── -->
  <div class="content" id="content">

    <!-- Empty / homepage state -->
    <div class="empty-state" id="empty-state">
      <div class="empty-logo">
        <span class="p">P</span><span class="e">e</span><span class="d">d</span><span class="u">u</span><span class="s">s</span>Search
      </div>
      <div class="empty-tagline">Search freely · no tracking</div>
      <div class="empty-suggestions">
        <a class="sugg-chip" href="?q=latest+AI+news" onclick="return chip(this)">🤖 latest AI news</a>
        <a class="sugg-chip" href="?q=free+vpn+2024" onclick="return chip(this)">🔒 free VPN 2024</a>
        <a class="sugg-chip" href="?q=how+to+learn+programming" onclick="return chip(this)">💻 learn programming</a>
        <a class="sugg-chip" href="?q=best+movies+2024" onclick="return chip(this)">🎬 best movies 2024</a>
        <a class="sugg-chip" href="?q=weather+today" onclick="return chip(this)">🌤 weather today</a>
        <a class="sugg-chip" href="?q=crypto+news" onclick="return chip(this)">₿ crypto news</a>
      </div>
    </div>

    <!-- Results state -->
    <div class="results-area" id="results-area" style="display:none; flex:1;">
      <div class="results-meta" id="results-meta"></div>
      <div class="loading-state" id="loading-state">
        <div class="loader-ring"></div>
        <div class="loader-text">SEARCHING…</div>
      </div>
      <iframe id="results-iframe" title="Search results" sandbox="allow-scripts allow-same-origin allow-forms allow-popups"></iframe>
    </div>

  </div>

  <footer>
    <div class="footer-txt">
      <a href="/">← PEDUS PROXY</a> &nbsp;·&nbsp; PedusSearch powered by Google
    </div>
    <div class="footer-links">
      <a href="?q=news">News</a>
      <a href="?q=images">Images</a>
      <a href="?q=videos">Videos</a>
    </div>
  </footer>

  <script>
    const input  = document.getElementById('search-input');
    const clearB = document.getElementById('clear-btn');

    // ── Read ?q from URL on load ─────────────────────────────────
    const params = new URLSearchParams(location.search);
    const initQ  = params.get('q') || '';

    if (initQ) {
      input.value = initQ;
      clearB.classList.add('visible');
      showResults(initQ);
    }

    document.getElementById('page-title').textContent =
      initQ ? `${initQ} — PedusSearch` : 'PedusSearch';

    // ── Input events ─────────────────────────────────────────────
    input.addEventListener('input', () => {
      clearB.classList.toggle('visible', input.value.length > 0);
    });
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') doSearch();
    });

    function clearSearch() {
      input.value = '';
      clearB.classList.remove('visible');
      input.focus();
      document.getElementById('empty-state').style.display = 'flex';
      document.getElementById('results-area').style.display = 'none';
      history.pushState({}, '', '/search');
      document.title = 'PedusSearch';
    }

    // ── Suggestion chips ─────────────────────────────────────────
    function chip(el) {
      const q = new URLSearchParams(new URL(el.href).search).get('q');
      if (q) { input.value = q; doSearch(); }
      return false;
    }

    // ── Do a search ───────────────────────────────────────────────
    function doSearch() {
      const q = input.value.trim();
      if (!q) return;
      clearB.classList.add('visible');
      history.pushState({}, '', '/search?q=' + encodeURIComponent(q));
      document.title = q + ' — PedusSearch';
      showResults(q);
    }

    function showResults(q) {
      document.getElementById('empty-state').style.display  = 'none';
      document.getElementById('results-area').style.display = 'flex';
      document.getElementById('loading-state').style.display = 'flex';
      document.getElementById('results-iframe').style.display = 'none';

      // Meta bar
      document.getElementById('results-meta').innerHTML =
        `<span>Searching for: <span class="q-label">"${escHtml(q)}"</span></span>` +
        `<span class="engine-badge">via Google</span>`;

      // Build the proxy URL to Google Search
      const googleUrl = 'https://www.google.com/search?q=' + encodeURIComponent(q) + '&hl=en';
      const proxyUrl  = '/proxy?url=' + encodeURIComponent(googleUrl);

      const iframe = document.getElementById('results-iframe');
      iframe.onload = () => {
        document.getElementById('loading-state').style.display = 'none';
        iframe.style.display = 'block';
      };
      iframe.onerror = () => {
        document.getElementById('loading-state').innerHTML =
          '<div style="color:#f87171;font-family:Space Mono,monospace;font-size:13px;">⚠ Could not load results. <a href="' + proxyUrl + '" style="color:#00ffb4;">Open directly →</a></div>';
      };
      iframe.src = proxyUrl;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Browser back/forward ─────────────────────────────────────
    window.addEventListener('popstate', () => {
      const q = new URLSearchParams(location.search).get('q') || '';
      input.value = q;
      clearB.classList.toggle('visible', q.length > 0);
      if (q) showResults(q);
      else clearSearch();
    });
  </script>
</body>
</html>
